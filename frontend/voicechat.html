<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduBot - Voice Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Roboto', sans-serif; background: black; }
    h1, h2, h3, h4, h5, h6, nav, button { font-family: 'Poppins', sans-serif; }

    /* Removed background image – solid black only */
    .welcome-bg { display: none; }

    .popup-indicator {
      display: none;
      position: absolute;
      bottom: 8px;
      right: 12px;
      background: rgba(59, 130, 246, 0.9);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      animation: blink 1.5s infinite;
    }
    @keyframes blink {
      0% { opacity: 0.2; }
      50% { opacity: 1; }
      100% { opacity: 0.2; }
    }
  </style>
</head>

<body class="min-h-screen flex flex-col bg-black text-white">

  <!-- HEADER -->
  <header class="bg-gradient-to-r from-blue-900/80 via-black/80 to-blue-900/80 shadow-lg 
                 rounded-3xl mt-6 mx-4 sm:mx-8 lg:mx-20 backdrop-blur-md">

    <div class="container mx-auto flex flex-col items-center px-4 py-4">
      <div class="flex flex-col items-center">
        
        <!-- White circular border -->
        <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-white p-1 shadow-xl overflow-hidden border-4 border-white">
          <img src="images__3_-removebg-preview.png" alt="EduBot Logo" class="w-full h-full object-cover" />
        </div>

        <h1 class="text-center text-base sm:text-lg md:text-2xl font-bold tracking-wide mt-3">
          EduBot
        </h1>
         <p class="text-center text-xs sm:text-sm text-gray-300 mt-1">
          (Your Smart Campus Assistant)
        </p>
      </div>

      <!-- Navigation -->
      <nav class="mt-4 w-full overflow-x-auto">
        <ul class="flex flex-nowrap justify-center whitespace-nowrap gap-6 
                   text-white font-medium bg-blue-950/70 rounded-xl px-6 py-2 
                   shadow-md backdrop-blur-sm">
          <li><a href="welcomescreen.html" class="hover:text-blue-400 transition">Home</a></li>
          <li><a href="voicechat.html" class="hover:text-blue-400 transition">Voice Chat</a></li>
          
        </ul>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-grow flex items-center justify-center p-6">
    <div class="w-full max-w-2xl h-[520px] bg-gradient-to-br from-blue-900/40 to-blue-800/40 
                text-white rounded-2xl shadow-lg backdrop-blur-lg 
                border border-blue-900/40 flex flex-col overflow-hidden">

      <!-- Title -->
      <div class="p-4 border-b border-blue-900/40">
        <h2 class="text-xl font-bold text-center">🎤 Voice Chat with EduBot</h2>
      </div>

      <!-- Chat Area -->
      <div id="chatArea" class="flex-grow overflow-y-auto bg-black/30 p-4 space-y-2 relative text-sm">
        <div class="text-gray-400 text-center">Your conversation will appear here...</div>
        <div id="typingIndicator" class="popup-indicator">Typing...</div>
        <div id="voiceIndicator" class="popup-indicator bg-green-600">Listening...</div>
      </div>

      <!-- Input Bar -->
      <div class="flex items-center gap-2 p-3 bg-black/40 border-t border-blue-900/40">
        <button id="voiceBtn" class="bg-blue-700 hover:bg-blue-800 text-white p-3 rounded-full shadow-lg">
          🎙️
        </button>

        <input id="textInput" type="text" placeholder="Type a message"
          class="flex-grow px-4 py-2 rounded-full border border-blue-900/40 bg-black/40 
                 text-white focus:outline-none" />

        <button id="sendBtn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-full shadow">
          ➤
        </button>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-gradient-to-r from-blue-900/80 via-black/80 to-blue-900/80 
                 py-4 text-center text-gray-200 text-sm rounded-3xl 
                 mx-4 sm:mx-8 lg:mx-20 mb-6 backdrop-blur-md">
    For further queries contact <span class="font-medium text-white">edubotofficial@gmail.com</span>
  </footer>

  <!-- JS -->
  <script>
    // Auto-detect backend URL based on current hostname
    // If accessed via IP (e.g., 192.168.43.95:3000), use same IP for backend (192.168.43.95:8000)
    // Otherwise, default to localhost:8000
    function getBackendURL() {
      if (window.__EDUBOT_API_BASE_URL__) {
        return window.__EDUBOT_API_BASE_URL__;
      }
      const hostname = window.location.hostname;
      // Replit proxy: derive backend URL from frontend URL
      if (hostname.includes('.replit.dev') || hostname.includes('.repl.co') || hostname.includes('.replit.app')) {
        return `https://${hostname.replace('-5000.', '-8000.')}`;
      }
      // If hostname is an IP address or not localhost, use it for backend
      if (hostname !== 'localhost' && hostname !== '127.0.0.1') {
        return `http://${hostname}:8000`;
      }
      return "http://localhost:8000";
    }
    const API_BASE_URL = getBackendURL();
    console.log('Backend URL:', API_BASE_URL);
    const voiceBtn = document.getElementById('voiceBtn');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatArea = document.getElementById('chatArea');
    const typingIndicator = document.getElementById('typingIndicator');
    const voiceIndicator = document.getElementById('voiceIndicator');
    const audioPlayer = new Audio();
    let recognition;
    let typingTimeout;

    async function sendQuestionToBackend(question) {
      typingIndicator.style.display = "block";
      addMessage("You", question);

      try {
        const response = await fetch(`${API_BASE_URL}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });

        const payload = await response.json();

        if (!response.ok) {
          const errorMessage = payload?.detail || "Unexpected error from server.";
          addMessage("EduBot", `⚠️ ${errorMessage}`);
          return;
        }

        addMessage("EduBot", payload.answer || "I couldn't generate an answer right now.");

        if (payload.audio_base64) {
          playAudio(payload.audio_base64);
        }
      } catch (error) {
        console.error("Failed to fetch from backend:", error);
        addMessage("EduBot", "⚠️ Unable to reach the server. Please try again later.");
      } finally {
        typingIndicator.style.display = "none";
      }
    }

    function playAudio(base64Data) {
      audioPlayer.src = `data:audio/mp3;base64,${base64Data}`;
      audioPlayer.play().catch((err) => {
        console.warn("Audio playback failed:", err);
      });
    }

    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.lang = "en-US";

      recognition.onstart = () => { voiceIndicator.style.display = "block"; };
      recognition.onend = () => { voiceIndicator.style.display = "none"; };
      recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript;
        sendQuestionToBackend(transcript);
      };

      voiceBtn.addEventListener("mousedown", () => recognition.start());
      voiceBtn.addEventListener("mouseup", () => recognition.stop());
      voiceBtn.addEventListener("mouseleave", () => recognition.stop());
      voiceBtn.addEventListener("touchstart", (e) => { e.preventDefault(); recognition.start(); });
      voiceBtn.addEventListener("touchend", () => recognition.stop());
    } else {
      voiceBtn.textContent = "No Mic";
      voiceBtn.disabled = true;
    }

    textInput.addEventListener("input", () => {
      typingIndicator.style.display = "block";
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => { typingIndicator.style.display = "none"; }, 1000);
    });

    sendBtn.addEventListener("click", () => {
      const text = textInput.value.trim();
      if (text) {
        sendQuestionToBackend(text);
        textInput.value = "";
        typingIndicator.style.display = "none";
      }
    });

    textInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        const text = textInput.value.trim();
        if (text) {
          sendQuestionToBackend(text);
          textInput.value = "";
        }
      }
    });

    function addMessage(sender, text) {
      const msg = document.createElement("div");
      if (sender === "You") {
        msg.className = "flex justify-end";
        msg.innerHTML = `<span class="bg-blue-600 px-3 py-2 rounded-2xl max-w-xs break-words">${text}</span>`;
      } else {
        msg.className = "flex justify-start";
        msg.innerHTML = `<span class="bg-gray-700 px-3 py-2 rounded-2xl max-w-xs break-words">${text}</span>`;
      }
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
    }
  </script>
</body>
</html>
