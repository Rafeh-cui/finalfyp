<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduBot - Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: black; /* Solid black background */
    }
    h1, h2, h3, h4, h5, h6, nav, button, label {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>

<body class="relative min-h-screen flex flex-col text-white">

  <!-- HEADER -->
  <header class="bg-gradient-to-r from-blue-900/80 via-black/80 to-blue-900/80 shadow-lg rounded-3xl mt-6 mx-4 sm:mx-8 lg:mx-20 backdrop-blur-md">
    <div class="container mx-auto flex flex-col items-center px-4 py-4">

      <div class="flex flex-col items-center">
        
        <!-- Logo with rounded white border -->
        <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-white border-4 border-white overflow-hidden shadow-lg">
          <img src="images__3_-removebg-preview.png" alt="COMSATS Logo" class="w-full h-full object-cover" />
        </div>

        <h1 class="text-center text-base sm:text-lg md:text-2xl font-bold text-white tracking-wide mt-3">
          EduBot
        </h1>

        <!-- Smaller subtitle in brackets -->
        <h2 class="text-center text-xs sm:text-sm text-gray-300 mt-1">
          (Your Smart Campus Assistant)
        </h2>

      </div>

    </div>
  </header>

  <!-- MAIN REGISTER CARD -->
  <main class="flex-grow flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-gradient-to-br from-blue-900/50 to-blue-800/50 text-white p-8 rounded-3xl shadow-lg backdrop-blur-lg border border-blue-900/40">
      <h2 class="text-2xl font-bold text-center mb-6">Create Your Account</h2>
      
      <form id="registerForm" class="space-y-4">
        
        <div>
          <label for="fullname" class="block text-sm font-medium">Full Name</label>
          <input type="text" id="fullname" placeholder="Enter your full name" required class="w-full px-4 py-3 mt-1 rounded-xl bg-white/90 text-black focus:ring-2 focus:ring-blue-600 outline-none" />
        </div>

        <div>
          <label for="email" class="block text-sm font-medium">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required class="w-full px-4 py-3 mt-1 rounded-xl bg-white/90 text-black focus:ring-2 focus:ring-blue-600 outline-none" />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium">Password</label>
          <input type="password" id="password" placeholder="Create a password" required class="w-full px-4 py-3 mt-1 rounded-xl bg-white/90 text-black focus:ring-2 focus:ring-blue-600 outline-none" />
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your password" required class="w-full px-4 py-3 mt-1 rounded-xl bg-white/90 text-black focus:ring-2 focus:ring-blue-600 outline-none" />
        </div>

        <button type="submit" class="w-full bg-blue-700 text-white py-3 rounded-xl shadow-lg hover:bg-blue-800 transition">
          Register
        </button>

      </form>

      <p class="text-center text-sm text-gray-300 mt-4">Already have an account? 
        <a href="login.html" class="text-blue-400 hover:underline">Login here</a>
      </p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-gradient-to-r from-blue-900/80 via-black/80 to-blue-900/80 py-4 text-center text-gray-200 text-sm rounded-3xl mx-4 sm:mx-8 lg:mx-20 mb-6 backdrop-blur-md">
    For further queries contact <span class="font-medium text-white">edubotofficial@gmail.com</span>
  </footer>

  <!-- Firebase Register JS -->
  <script type="module">
    import { handleRegistration } from "./registerHandler.js";
    document.getElementById("registerForm").addEventListener("submit", handleRegistration);
  </script>

</body>
</html>
