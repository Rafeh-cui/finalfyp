<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
    }
    h1, h2, h3, h4, h5, h6, button {
      font-family: 'Poppins', sans-serif;
    }
    .reset-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url("background.png") no-repeat center center;
      background-size: cover;
      filter: blur(2px) brightness(0.7);
      z-index: -1;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center text-white relative">

  <!-- Background -->
  <div class="reset-bg"></div>

  <!-- Reset Password Card -->
  <div class="w-full max-w-md bg-gradient-to-br from-blue-900/70 to-blue-800/70 p-8 rounded-3xl shadow-xl backdrop-blur-lg border border-blue-900/40">
    <div class="flex flex-col items-center space-y-3">
      <!-- Logo -->
      <div class="w-16 h-16 rounded-full bg-white overflow-hidden shadow-md">
        <img src="images__3_-removebg-preview.png" alt="EduBot Logo" class="w-full h-full object-cover">
      </div>
      <h2 class="text-2xl font-bold">Reset Password</h2>
      <p class="text-gray-300 text-sm text-center">Enter your registered email and we will send you a link to reset your password.</p>
    </div>

    <!-- Form -->
    <form id="resetForm" class="mt-6 space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-200">Email Address</label>
        <input id="email" type="email" placeholder="Enter your email" required
               class="mt-1 w-full px-4 py-3 rounded-xl bg-white/90 text-gray-900 placeholder-gray-500 focus:ring-2 focus:ring-blue-500 outline-none shadow-md">
      </div>

      <button type="submit"
        class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 px-6 rounded-xl shadow-lg transition">
        Send Reset Link
      </button>

      <div class="text-center">
        <a href="login.html" class="text-blue-400 hover:underline text-sm">Back to Login</a>
      </div>
    </form>
  </div>

  <!-- Footer -->
  <footer class="absolute bottom-6 text-gray-300 text-sm text-center">
    © 2025 EduBot - COMSATS University Attock
  </footer>

  <!-- JavaScript for Alert -->
  <script>
  document.getElementById("registerForm").addEventListener("submit", function(e) {
    e.preventDefault();

    // ✅ Get values
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (name && email && password) {
      // 👉 Save to localStorage
      localStorage.setItem("userEmail", email);
      localStorage.setItem("userPassword", password);

      alert("✅ Registration successful! Please login.");
      window.location.href = "login.html"; // Go back to login
    } else {
      alert("⚠ Please fill all fields!");
    }
  });
</script>


</body>
</html>
