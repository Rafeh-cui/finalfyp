<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — EduBot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Roboto', sans-serif; }
    h1, h2, h3, h4, h5, h6, button { font-family: 'Poppins', sans-serif; }
    .reset-bg {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: url("background.png") no-repeat center center;
      background-size: cover;
      filter: blur(2px) brightness(0.7);
      z-index: -1;
    }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body class="min-h-screen flex flex-col justify-center items-center text-white relative">

  <!-- Background -->
  <div class="reset-bg"></div>

  <!-- Card -->
  <div class="w-full max-w-md bg-gradient-to-br from-blue-900/70 to-blue-800/70 p-8 rounded-3xl shadow-xl backdrop-blur-lg border border-blue-900/40">

    <div class="flex flex-col items-center space-y-3 mb-6">
      <div class="w-16 h-16 rounded-full bg-white overflow-hidden shadow-md">
        <img src="images__3_-removebg-preview.png" alt="EduBot Logo" class="w-full h-full object-cover">
      </div>
      <h2 class="text-2xl font-bold">Reset Password</h2>
      <p class="text-gray-300 text-sm text-center">Enter your registered email and we'll send you a reset link.</p>
    </div>

    <!-- Status banner -->
    <div id="banner" class="hidden mb-4 rounded-xl px-4 py-3 text-sm text-center"></div>

    <!-- Form -->
    <form id="resetForm" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-200">Email Address</label>
        <input id="email" type="email" autocomplete="email" placeholder="Enter your email" required
               class="mt-1 w-full px-4 py-3 rounded-xl bg-white/90 text-gray-900 placeholder-gray-500 focus:ring-2 focus:ring-blue-500 outline-none shadow-md">
      </div>

      <button type="submit" id="submitBtn"
        class="w-full bg-blue-700 hover:bg-blue-800 disabled:opacity-60 text-white font-semibold py-3 px-6 rounded-xl shadow-lg transition">
        Send Reset Link
      </button>

      <div class="text-center">
        <a href="login.html" class="text-blue-400 hover:underline text-sm">← Back to Login</a>
      </div>
    </form>
  </div>

  <!-- Footer -->
  <footer class="absolute bottom-6 text-gray-300 text-sm text-center">
    © 2025 EduBot — COMSATS University Attock
  </footer>

  <script type="module">
    import { auth } from "./firebase.js";
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";

    const form      = document.getElementById("resetForm");
    const emailEl   = document.getElementById("email");
    const submitBtn = document.getElementById("submitBtn");
    const banner    = document.getElementById("banner");

    function showBanner(msg, type = "error") {
      banner.className = "mb-4 rounded-xl px-4 py-3 text-sm text-center " + (
        type === "success"
          ? "bg-green-800/60 border border-green-600/50 text-green-200"
          : "bg-red-900/60 border border-red-700/50 text-red-200"
      );
      banner.textContent = msg;
      banner.classList.remove("hidden");
    }

    const ERROR_MSGS = {
      "auth/user-not-found":         "No account found with that email address.",
      "auth/invalid-email":          "Please enter a valid email address.",
      "auth/too-many-requests":      "Too many attempts. Please wait a moment and try again.",
      "auth/network-request-failed": "Network error. Please check your connection.",
    };

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      banner.classList.add("hidden");

      const email = emailEl.value.trim();
      if (!email) { showBanner("Please enter your email address."); return; }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Sending…';

      try {
        await sendPasswordResetEmail(auth, email);
        showBanner("✅ Reset email sent! Check your inbox (and spam folder).", "success");
        emailEl.value = "";
      } catch (err) {
        console.error("[EduBot] Password reset error:", err.code, err.message);
        showBanner(ERROR_MSGS[err.code] || err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Send Reset Link";
      }
    });
  </script>

</body>
</html>
