  <!-- Google Fonts -->

  <style>
    body {

    }
    h1, h2, h3, h4, h5, h6, nav, button {

    }
         /* Background Image with Blur Overlay */
    .welcome-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: url("background.png") no-repeat center center;
      background-size: cover;
      z-index: -1;
      filter: blur(2px) brightness(0.7); /* blur + dark overlay */
