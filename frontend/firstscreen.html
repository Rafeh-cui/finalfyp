<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduBot - Start Screen</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
    }
    h1, h2, h3, h4, h5, h6, nav, button {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col bg-gradient-to-br from-gray-900 via-black to-gray-900 relative overflow-hidden">

  <!-- Background Aesthetic Shapes -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute -top-20 -left-20 w-72 h-72 bg-blue-800/30 rounded-full blur-3xl"></div>
    <div class="absolute top-40 -right-20 w-80 h-80 bg-purple-700/20 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 left-1/2 -translate-x-1/2 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>
  </div>

  <!-- MAIN CONTAINER -->
  <main class="flex-grow flex items-center justify-center p-4 sm:p-6 relative z-10">
    <div class="w-full max-w-sm sm:max-w-md md:max-w-lg 
                bg-gradient-to-br from-blue-900/50 to-blue-800/50 
                text-white p-8 sm:p-10 md:p-12 
                shadow-lg backdrop-blur-lg border border-blue-900/40 
                text-center space-y-6 rounded-3xl">
      
      <!-- Bot Logo -->
      <div class="relative mx-auto w-24 h-24 sm:w-28 sm:h-28 lg:w-32 lg:h-32 
                  rounded-full overflow-hidden shadow-xl flex items-center justify-center
                  bg-gradient-to-br from-blue-200 via-white to-blue-100 border-4 border-blue-600">
        <!-- Glow Effect -->
        <div class="absolute inset-0 rounded-full bg-blue-400 opacity-40 blur-2xl"></div>

        <!-- Logo -->
        <img src="images__3_-removebg-preview.png" 
             alt="EduBot Logo" 
             class="relative z-10 w-14 h-14 sm:w-20 sm:h-20 md:w-24 md:h-24 object-contain" />
      </div>

      <!-- Title -->
      <h2 class="text-xl sm:text-2xl md:text-3xl font-bold">EduBot</h2>
      <p class="text-gray-300 text-sm sm:text-base md:text-lg">Your Smart Campus Assistant</p>

      <!-- Button -->
      <button id="startChatBtn" 
              class="w-full bg-blue-700 text-white py-3 px-6 rounded-xl shadow-lg hover:bg-blue-800 transition text-sm sm:text-base md:text-lg">
        Start Chat
      </button>
    </div>
  </main>

  <script>
    document.getElementById('startChatBtn').addEventListener('click', () => {
      // ✅ Now opens login screen
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
